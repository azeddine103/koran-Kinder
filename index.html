<style>
:root{
  --sun:#ffb703;--sun2:#fb8500;--leaf:#40b37a;--leaf2:#1e6e4a;
  --night:#1a3a6b;--moon:#a8e6f0;--star:#ffd60a;--bg:#f5fbff;--card:#fff;
  --text:#1a2840;--dim:#5a6e8a;--red:#e63946;--mark:#ff5722;--radius:22px;
  --touch:52px;
  --ctrl:40px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:18px;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'Baloo 2',sans-serif;min-height:100vh;
  background-image:
    radial-gradient(circle at 8% 12%,rgba(255,183,3,.18),transparent 38%),
    radial-gradient(circle at 92% 82%,rgba(64,179,122,.14),transparent 38%);}

/* ── HEADER ── */
.hdr{background:linear-gradient(145deg,#1e6e4a 0%,#1a3a6b 100%);
  padding:28px 20px 22px;text-align:center;position:relative;overflow:hidden;}
.hdr::before{content:"";position:absolute;inset:0;opacity:.06;
  background:radial-gradient(circle at 30% 50%,#fff 1px,transparent 1px),
    radial-gradient(circle at 70% 50%,#fff 1px,transparent 1px);
  background-size:30px 30px;}
.hdr-title{font-size:32px;font-weight:800;color:#fff;position:relative;letter-spacing:-.3px}
.hdr-title span{color:var(--star)}
.hdr-sub{font-size:15px;color:rgba(255,255,255,.78);margin-top:5px;position:relative;font-weight:600}
.hdr-ar{font-family:'Amiri',serif;font-size:26px;color:var(--star);margin-top:8px;position:relative;direction:rtl}
.total-prog{background:rgba(255,255,255,.14);border-radius:30px;padding:10px 24px;
  color:#fff;font-size:15px;font-weight:700;margin-top:16px;display:inline-block;position:relative}
.total-prog span{color:var(--star);font-size:17px}
.stars-badge{position:absolute;top:14px;right:14px;background:var(--star);color:#7c4f00;
  border-radius:18px;padding:5px 12px;font-size:13px;font-weight:800;
  box-shadow:0 3px 10px rgba(255,214,10,.4);}

/* ── GRID ── */
.grid-wrap{padding:22px 14px 120px}
.grid-title{font-size:14px;font-weight:700;color:var(--dim);text-transform:uppercase;
  letter-spacing:1.8px;margin-bottom:16px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.surah-card{background:var(--card);border-radius:var(--radius);padding:18px 16px 16px;
  box-shadow:0 4px 16px rgba(26,40,64,.09);cursor:pointer;
  transition:transform .2s,box-shadow .2s;position:relative;border:3px solid transparent;
  -webkit-user-select:none;user-select:none;}
.surah-card:active{transform:scale(.96)}
.surah-card.done{border-color:var(--star);background:linear-gradient(150deg,#fffbdf,#fff8c0)}
.surah-card.done::after{content:"¹3";position:absolute;top:12px;right:14px;
  font-size:20px;color:var(--leaf2);font-weight:800;}
.sc-num{display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--sun),var(--sun2));
  color:#fff;font-weight:800;font-size:17px;margin-bottom:10px;
  box-shadow:0 3px 8px rgba(251,133,0,.35);}
.sc-ar{font-family:'Amiri',serif;font-size:22px;color:var(--leaf2);direction:rtl;font-weight:700;line-height:1.35}
.sc-de{font-size:13px;color:var(--dim);margin-top:4px;line-height:1.3;font-weight:600}
.sc-count{font-size:13px;color:var(--dim);margin-top:8px;font-weight:600}
.sc-stars{display:flex;gap:3px;margin-top:9px}
.sc-star{font-size:16px;filter:grayscale(1);opacity:.25;transition:.3s}
.sc-star.lit{filter:none;opacity:1}

/* ── SURAH VIEW ── */
.surah-view{display:none;position:fixed;inset:0;z-index:100;
  background:var(--bg);overflow-y:auto;padding-bottom:160px;
  -webkit-overflow-scrolling:touch;}
.surah-view.show{display:block;animation:slideUp .28s ease}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}

.sv-hdr{background:linear-gradient(145deg,var(--leaf2),var(--night));
  padding:20px 18px 16px;position:sticky;top:0;z-index:10;
  box-shadow:0 3px 14px rgba(0,0,0,.2);}
.sv-hdr-row{display:flex;align-items:center;gap:14px}
.back-btn{width:var(--touch);height:var(--touch);border-radius:14px;
  background:rgba(255,255,255,.18);border:none;color:#fff;
  font-size:22px;cursor:pointer;display:grid;place-items:center;flex-shrink:0;}
.back-btn:active{background:rgba(255,255,255,.3)}
.sv-names{flex:1;text-align:center;min-width:0}
.sv-ar{font-family:'Amiri',serif;font-size:28px;color:var(--star);direction:rtl;font-weight:700}
.sv-de{font-size:14px;color:rgba(255,255,255,.8);font-weight:700;margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sv-prog-bar{height:8px;background:rgba(255,255,255,.2);border-radius:8px;margin-top:14px;overflow:hidden}
.sv-prog-fill{height:100%;background:var(--star);border-radius:8px;transition:width .5s}
.sv-prog-txt{font-size:13px;color:rgba(255,255,255,.75);margin-top:6px;text-align:center;font-weight:700}
.sv-stars{display:inline-flex;align-items:center;gap:6px;margin-top:8px;
  background:rgba(255,214,10,.18);border-radius:20px;padding:5px 14px;
  font-size:14px;font-weight:800;color:var(--star);}

/* ── CONTROLS ── */
.sv-controls{background:var(--card);border-bottom:2px solid rgba(0,0,0,.07);
  padding:14px 16px;position:sticky;top:96px;z-index:9;
  box-shadow:0 2px 10px rgba(0,0,0,.06);}
.ctrl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.ctrl-row:last-child{margin-bottom:0}

.play-all-btn{display:inline-flex;align-items:center;gap:7px;
  height:var(--ctrl);padding:0 14px;border-radius:20px;border:none;cursor:pointer;
  font-family:'Baloo 2',sans-serif;font-weight:800;font-size:14px;
  background:linear-gradient(135deg,var(--leaf),var(--leaf2));color:#fff;
  box-shadow:0 3px 10px rgba(30,110,74,.3);transition:.2s;white-space:nowrap;}
.play-all-btn:active{transform:scale(.95)}

.play-marked-btn{display:none;align-items:center;gap:7px;
  height:var(--ctrl);padding:0 14px;border-radius:20px;border:none;cursor:pointer;
  font-family:'Baloo 2',sans-serif;font-weight:800;font-size:13px;
  background:linear-gradient(135deg,var(--mark),#c1440e);color:#fff;
  box-shadow:0 3px 10px rgba(255,87,34,.3);transition:.2s;white-space:nowrap;}
.play-marked-btn.show{display:inline-flex}
.play-marked-btn:active{transform:scale(.95)}

.stop-btn{display:none;align-items:center;gap:7px;
  height:var(--ctrl);padding:0 14px;border-radius:20px;border:none;cursor:pointer;
  font-family:'Baloo 2',sans-serif;font-weight:800;font-size:14px;
  background:linear-gradient(135deg,#ef233c,#c1121f);color:#fff;
  box-shadow:0 3px 10px rgba(239,35,60,.35);
  animation:stopBlink 2s infinite;}
.stop-btn.show{display:inline-flex}
@keyframes stopBlink{0%,100%{box-shadow:0 4px 14px rgba(239,35,60,.4)}
  50%{box-shadow:0 4px 22px rgba(239,35,60,.7)}}

.ctrl-sep{width:1px;height:28px;background:rgba(0,0,0,.1);flex-shrink:0}
.ctrl-label{font-size:13px;color:var(--dim);font-weight:700;white-space:nowrap}
.range-inp{width:50px;height:var(--ctrl);border-radius:10px;
  border:2px solid var(--leaf);font-family:'Baloo 2',sans-serif;
  font-weight:800;font-size:15px;text-align:center;
  color:var(--leaf2);background:#fff;outline:none;
  -moz-appearance:textfield;}
.range-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.range-inp:focus{border-color:var(--sun2);box-shadow:0 0 0 3px rgba(251,133,0,.2)}
.repeat-sel{height:var(--ctrl);padding:0 12px;border-radius:20px;
  border:2px solid var(--leaf);background:#fff;color:var(--leaf2);
  font-family:'Baloo 2',sans-serif;font-weight:800;font-size:14px;
  cursor:pointer;outline:none;}
.mark-hint{font-size:14px;color:var(--mark);font-weight:800;
  background:rgba(255,87,34,.1);border-radius:16px;padding:6px 12px;display:none}
.mark-hint.show{display:inline-block}

/* ── VERSE CARDS ── */
.verses-list{padding:16px 14px}
.verse-card{background:var(--card);border-radius:22px;margin-bottom:16px;
  box-shadow:0 3px 14px rgba(26,40,64,.08);overflow:hidden;
  border:3px solid transparent;transition:border-color .2s,box-shadow .2s;
  cursor:pointer;-webkit-user-select:none;user-select:none;}
.verse-card:active{transform:scale(.99)}
.verse-card.learned{border-color:var(--star);
  background:linear-gradient(150deg,#fffde7,#fff)}
.verse-card.playing{border-color:var(--leaf)!important;
  box-shadow:0 6px 22px rgba(64,179,122,.3)!important;
  background:linear-gradient(150deg,#f0fff6,#fff)!important;}
.verse-card.marked{border-color:var(--mark)!important;
  background:linear-gradient(150deg,#fff4f0,#fff)!important}

.vc-top{display:flex;align-items:flex-start;gap:14px;padding:20px 18px 14px}
.vc-num{flex-shrink:0;width:44px;height:44px;border-radius:14px;
  background:linear-gradient(135deg,var(--moon),var(--night));
  color:#fff;font-weight:800;font-size:18px;display:grid;place-items:center;
  box-shadow:0 3px 8px rgba(26,58,107,.3);}
.vc-arabic{flex:1;font-family:'Amiri',serif;font-size:32px;direction:rtl;
  text-align:right;line-height:1.9;color:var(--leaf2);font-weight:700;}

/* Transliteration — large, bold, readable */
.vc-translit{padding:0 18px 14px;font-size:20px;font-weight:700;
  color:#2a4a2a;line-height:1.65;letter-spacing:.15px}

.vc-bottom{display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-top:2px solid rgba(0,0,0,.05);background:rgba(240,249,255,.6);
  flex-wrap:wrap}

.v-play-btn{flex-shrink:0;width:var(--touch);height:var(--touch);border-radius:50%;
  background:linear-gradient(135deg,var(--leaf),var(--leaf2));
  border:none;color:#fff;font-size:18px;cursor:pointer;
  display:grid;place-items:center;
  box-shadow:0 4px 12px rgba(30,110,74,.35);transition:.2s;}
.v-play-btn:active{transform:scale(.9)}
.v-play-btn.playing{background:linear-gradient(135deg,var(--sun),var(--sun2));
  animation:vPulse .85s infinite;box-shadow:0 4px 12px rgba(251,133,0,.45);}
@keyframes vPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}

.v-mark-btn{flex-shrink:0;width:var(--touch);height:var(--touch);border-radius:50%;
  background:rgba(255,87,34,.08);border:2.5px solid rgba(255,87,34,.3);
  color:var(--mark);font-size:18px;cursor:pointer;
  display:grid;place-items:center;transition:.25s;}
.v-mark-btn:active{transform:scale(.9)}
.v-mark-btn.marked{background:var(--mark);border-color:var(--mark);color:#fff;
  box-shadow:0 3px 10px rgba(255,87,34,.45);}

.v-repeat-info{flex:1;font-size:14px;color:var(--dim);font-weight:700;min-width:60px}
.v-repeat-info .cnt{color:var(--leaf2);font-weight:800;font-size:15px}

.v-learned-btn{display:inline-flex;align-items:center;gap:6px;
  height:44px;padding:0 16px;border-radius:22px;cursor:pointer;
  font-family:'Baloo 2',sans-serif;font-size:14px;font-weight:800;
  border:2.5px solid var(--leaf);background:transparent;color:var(--leaf2);
  transition:.2s;white-space:nowrap;}
.v-learned-btn:active{transform:scale(.95)}
.v-learned-btn.done{background:var(--star);border-color:var(--star);color:#7c4f00;
  box-shadow:0 3px 10px rgba(255,214,10,.4);}

/* ── PLAYING BAR ── */
.now-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);
  border-top:2.5px solid rgba(0,0,0,.08);padding:12px 18px 22px;
  display:none;align-items:center;gap:14px;
  box-shadow:0 -6px 24px rgba(0,0,0,.12);z-index:50;}
.now-bar.show{display:flex}
.nb-info{flex:1;min-width:0}
.nb-label{font-size:12px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.nb-ar{font-family:'Amiri',serif;font-size:22px;color:var(--leaf2);direction:rtl;
  display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
.nb-txt{font-size:14px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nb-stop{width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#ef233c,#c1121f);border:none;
  color:#fff;font-size:22px;cursor:pointer;display:grid;place-items:center;flex-shrink:0;
  box-shadow:0 4px 14px rgba(239,35,60,.45);}
.nb-stop:active{transform:scale(.9)}

/* ── CELEBRATION ── */
.celebration{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.65);align-items:center;justify-content:center;}
.celebration.show{display:flex;animation:fadein .3s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.cel-card{background:#fff;border-radius:32px;padding:44px 32px;text-align:center;
  max-width:340px;width:92%;box-shadow:0 24px 60px rgba(0,0,0,.35);
  animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);}
@keyframes popIn{from{transform:scale(.65);opacity:0}to{transform:scale(1);opacity:1}}
.cel-emoji{font-size:80px;margin-bottom:14px;display:block;animation:bounce 1s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-14px)}}
.cel-title{font-size:30px;font-weight:800;color:var(--leaf2);margin-bottom:8px}
.cel-sub{font-size:18px;color:var(--dim);margin-bottom:22px;font-weight:600;line-height:1.4}
.cel-pts{font-size:24px;font-weight:800;color:var(--sun2);margin-bottom:26px}
.cel-close{height:56px;padding:0 36px;border-radius:28px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--leaf),var(--leaf2));
  color:#fff;font-family:'Baloo 2',sans-serif;font-size:18px;font-weight:800;
  box-shadow:0 4px 14px rgba(30,110,74,.4);}
.cel-close:active{transform:scale(.95)}

.star-rain{position:fixed;inset:0;pointer-events:none;z-index:199;overflow:hidden}
.star-drop{position:absolute;top:-40px;font-size:28px;animation:starFall linear forwards;}
@keyframes starFall{to{transform:translateY(110vh) rotate(360deg);opacity:0}}

/* PWA Install */
.install-btn{display:none;align-items:center;gap:8px;
  padding:10px 18px;border-radius:24px;border:2px solid rgba(255,255,255,.5);
  background:rgba(255,255,255,.15);color:#fff;cursor:pointer;
  font-family:'Baloo 2',sans-serif;font-weight:700;font-size:14px;
  margin-top:12px;transition:.2s;position:relative;}
.install-btn.show{display:inline-flex}
.install-btn:hover{background:rgba(255,255,255,.25)}
.offline-badge{display:none;position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%);background:#e63946;color:#fff;
  border-radius:20px;padding:8px 18px;font-size:14px;font-weight:700;
  z-index:300;box-shadow:0 4px 14px rgba(0,0,0,.3);animation:fadein .3s ease}
.offline-badge.show{display:block}


@media(max-width:400px){
  .vc-arabic{font-size:28px}
  .vc-translit{font-size:18px}
  .sv-ar{font-size:24px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:11px}
}
@media(min-width:600px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
  .vc-arabic{font-size:34px}
  .vc-translit{font-size:22px}
}
</style>
</head>
<body>
<header class="hdr">
  <div class="stars-badge" id="starsBadge">&#x2B50; 0</div>
  <div class="hdr-title"><span>&#x62C;&#x632;&#x621; &#x639;&#x645;&#x651;</span> &mdash; Juz Amma</div>
  <div class="hdr-ar">&#x62A;&#x639;&#x644;&#x651;&#x645; &#x627;&#x644;&#x642;&#x631;&#x622;&#x646; &#x62E;&#x637;&#x648;&#x629;&#x64B; &#x62E;&#x637;&#x648;&#x629;&#x64B;</div>
  <div class="hdr-sub">37 Suren &middot; Schritt f&uuml;r Schritt auswendig lernen</div>
  <div class="total-prog" id="totalProg">0 von 564 Versen gelernt &middot; <span>0%</span></div>
  <button class="install-btn" id="installBtn">&#x1F4F2; App installieren</button>
</header>
<div class="grid-wrap"><div class="grid-title">W&auml;hle eine Sure</div><div class="grid" id="surahGrid"></div></div>
<div class="surah-view" id="surahView">
  <div class="sv-hdr">
    <div class="sv-hdr-row">
      <button class="back-btn" id="backBtn">&#8592;</button>
      <div class="sv-names"><div class="sv-ar" id="svAr"></div><div class="sv-de" id="svDe"></div></div>
    </div>
    <div class="sv-prog-bar"><div class="sv-prog-fill" id="svProgFill" style="width:0%"></div></div>
    <div class="sv-prog-txt" id="svProgTxt">0 von ? gelernt</div>
    <div style="text-align:center"><span class="sv-stars" id="svStars">&#x2B50; 0 Sterne</span></div>
  </div>
  <div class="sv-controls">
    <div class="ctrl-row">
      <button class="play-all-btn" id="playAllBtn">&#x25B6; Abspielen</button>
      <span class="ctrl-label">Von V.</span>

const VC=[7, 286, 200, 176, 120, 165, 206, 75, 129, 109, 123, 111, 43, 52, 99, 128, 111, 110, 98, 135, 112, 78, 118, 64, 77, 227, 93, 88, 69, 60, 34, 30, 73, 54, 45, 83, 182, 88, 75, 85, 54, 53, 89, 59, 37, 35, 38, 29, 18, 45, 60, 49, 62, 55, 78, 96, 29, 22, 24, 13, 14, 11, 11, 18, 12, 12, 30, 52, 52, 44, 28, 28, 20, 56, 40, 31, 50, 40, 46, 42, 29, 19, 36, 25, 22, 17, 19, 26, 30, 20, 15, 21, 11, 8, 8, 19, 5, 8, 8, 11, 11, 8, 3, 9, 5, 4, 7, 3, 6, 3, 5, 4, 5, 6];

// ── Helpers ──
function gAyah(s,n){let g=n;for(let i=0;i<s-1;i++)g+=VC[i];return g;}
function audioUrl(sid,n){return 'https://cdn.islamic.network/quran/audio/128/ar.shaatree/'+gAyah(sid,n)+'.mp3';}

// ── State ──
let curSurahIdx=null,curSurah=null;
let aud=new Audio();
let queue=[],playing=false;
let totalStars=0; // kept for celebrate display only

// ── Persistence ──
function lKey(sid,n){return 'kl_'+sid+'_'+n;}
function mKey(sid){return 'km_'+sid;}
function isLearned(sid,n){return localStorage.getItem(lKey(sid,n))==='1';}
function setLearned(sid,n,v){v?localStorage.setItem(lKey(sid,n),'1'):localStorage.removeItem(lKey(sid,n));}
function getMarked(sid){try{return JSON.parse(localStorage.getItem(mKey(sid))||'[]');}catch(e){return[];}}
function setMarked(sid,arr){localStorage.setItem(mKey(sid),JSON.stringify(arr));}
function isMarked(sid,n){return getMarked(sid).includes(n);}
function toggleMarked(sid,n){let a=getMarked(sid);const i=a.indexOf(n);i>=0?a.splice(i,1):a.push(n);setMarked(sid,a);return a.length;}
function surahDone(s){return s.v.filter(v=>isLearned(s.id,v.n)).length;}
function totalDone(){return SURAHS.reduce((t,s)=>t+surahDone(s),0);}

// ── Stars ──
function updateStarBadge(){
  const n=totalDone();
  document.getElementById('starsBadge').textContent='\u2B50 '+n;
}
// kept for celebration bonus display only
function addStars(n){updateStarBadge();}
function rmStar(){updateStarBadge();}

// ── Grid ──
function buildGrid(){
  const grid=document.getElementById('surahGrid');grid.innerHTML='';
  SURAHS.forEach((s,i)=>{
    const tot=s.v.length,done=surahDone(s),allDone=done>=tot;
    const starCount=Math.round((done/tot)*5);
    let stHtml='<div class="sc-stars">';
    for(let j=0;j<5;j++)stHtml+='<span class="sc-star'+(j<starCount?' lit':'')+'">&#x2B50;</span>';
    stHtml+='</div>';
    const card=document.createElement('div');
    card.className='surah-card'+(allDone?' done':'');
    card.innerHTML='<div class="sc-num">'+s.id+'</div>'+
      '<div class="sc-ar">'+s.name_ar+'</div>'+
      '<div class="sc-de">'+s.name_de.split('\u2014')[0].trim()+'</div>'+
      '<div class="sc-count">'+done+' / '+tot+' Verse &#x1F4D6;</div>'+stHtml;
    card.addEventListener('click',()=>openSurah(i));
    grid.appendChild(card);
  });
  updateTotal();
}
function updateTotal(){
  const done=totalDone(),pct=Math.round(done/564*100);
  document.getElementById('totalProg').innerHTML=done+' von 564 Versen gelernt &middot; <span>'+pct+'%</span>';
  updateStarBadge();
}

// ── Open Surah ──
function openSurah(idx){
  stopAudio();curSurahIdx=idx;curSurah=SURAHS[idx];
  const s=curSurah,tot=s.v.length;
  document.getElementById('svAr').textContent=s.name_ar;
  document.getElementById('svDe').textContent=s.id+'. '+s.name_de;
  document.getElementById('fromInp').max=tot;document.getElementById('fromInp').value=1;
  document.getElementById('toInp').max=tot;document.getElementById('toInp').value=tot;
  buildVerses(s);updateSurahProg(s);updateMarkedUi(s);
  // Restore range inputs from saved marks if any
  const saved=getMarked(s.id);
  if(saved.length>0){
    document.getElementById('fromInp').value=Math.min(...saved);
    document.getElementById('toInp').value=Math.max(...saved);
  }
  const sv=document.getElementById('surahView');sv.classList.add('show');sv.scrollTop=0;
}
function closeSurah(){stopAudio();document.getElementById('surahView').classList.remove('show');buildGrid();}

// ── Build Verses ──
function buildVerses(s){
  const list=document.getElementById('versesList');list.innerHTML='';
  const reps=parseInt(document.getElementById('repeatSel').value)||3;
  s.v.forEach(v=>{
    const learned=isLearned(s.id,v.n),marked=isMarked(s.id,v.n);
    const card=document.createElement('div');
    card.id='vc_'+s.id+'_'+v.n;
    let cls='verse-card';if(learned)cls+=' learned';if(marked)cls+=' marked';
    card.className=cls;
    card.innerHTML=
      '<div class="vc-top">'+
        '<div class="vc-num">'+v.n+'</div>'+
        '<div class="vc-arabic">'+v.t+'</div>'+
      '</div>'+
      (v.r?'<div class="vc-translit">'+v.r+'</div>':'')+
      '<div class="vc-bottom">'+
        '<button class="v-play-btn" id="vp_'+s.id+'_'+v.n+'">&#x25B6;</button>'+
        '<button class="v-mark-btn'+(marked?' marked':'')+'" id="vm_'+s.id+'_'+v.n+'" title="Vers markieren f\u00FCr Wiederholung">&#x1F501;</button>'+
        '<span class="v-repeat-info" id="vri_'+s.id+'_'+v.n+'">Spiele <span class="cnt">'+reps+'&times;</span></span>'+
        '<button class="v-learned-btn'+(learned?' done':'')+'" id="vl_'+s.id+'_'+v.n+'">'+
          (learned?'\u2713 Gelernt!':'Ich kann es! \u2B50')+'</button>'+
      '</div>';

    card.querySelector('.v-play-btn').addEventListener('click',e=>{
      e.stopPropagation();
      const btn=document.getElementById('vp_'+s.id+'_'+v.n);
      if(btn.classList.contains('playing')){
        stopAudio();
      } else {
        playSingleVerse(s,v.n,parseInt(document.getElementById('repeatSel').value)||3);
      }
    });
    card.querySelector('.v-mark-btn').addEventListener('click',e=>{
      e.stopPropagation();
      toggleMarked(s.id,v.n);
      const now=isMarked(s.id,v.n);
      document.getElementById('vm_'+s.id+'_'+v.n).className='v-mark-btn'+(now?' marked':'');
      refreshCardClass(s,v.n);
      syncRangeToMarked(s);
      updateMarkedUi(s);
    });
    // Click anywhere on card (not on a button) to toggle mark
    card.addEventListener('click',e=>{
      if(e.target.closest('button')||e.target.tagName==='BUTTON')return;
      toggleMarked(s.id,v.n);
      const now=isMarked(s.id,v.n);
      document.getElementById('vm_'+s.id+'_'+v.n).className='v-mark-btn'+(now?' marked':'');
      refreshCardClass(s,v.n);
      syncRangeToMarked(s);
      updateMarkedUi(s);
    });
    card.querySelector('.v-learned-btn').addEventListener('click',e=>{
      e.stopPropagation();
      const was=isLearned(s.id,v.n);
      setLearned(s.id,v.n,!was);
      if(!was)addStars(1); else rmStar();
      refreshCardClass(s,v.n);
      const btn=document.getElementById('vl_'+s.id+'_'+v.n);
      btn.className='v-learned-btn'+(!was?' done':'');
      btn.textContent=!was?'\u2713 Gelernt!':'Ich kann es! \u2B50';
      updateSurahProg(s);updateTotal();
      if(!was)checkComplete(s);
    });
    list.appendChild(card);
  });
}

function refreshCardClass(s,n){
  const card=document.getElementById('vc_'+s.id+'_'+n);
  if(!card)return;
  let cls='verse-card';
  if(isLearned(s.id,n))cls+=' learned';
  if(isMarked(s.id,n))cls+=' marked';
  // preserve playing class
  if(card.classList.contains('playing'))cls+=' playing';
  card.className=cls;
}

function updateSurahProg(s){
  const done=surahDone(s),tot=s.v.length;
  document.getElementById('svProgFill').style.width=Math.round(done/tot*100)+'%';
  document.getElementById('svProgTxt').textContent=done+' von '+tot+' Versen gelernt';
  document.getElementById('svStars').textContent='⭐ '+done+' von '+tot+' Sternen';
}
function updateMarkedUi(s){
  const arr=getMarked(s.id),n=arr.length;
  const btn=document.getElementById('playMarkedBtn');
  document.getElementById('markedCount').textContent=n;
  if(n>0){
    btn.className='play-marked-btn show';
    const hint=document.getElementById('markHint');
    hint.className='mark-hint show';
    hint.textContent=n+(n===1?' Vers':' Verse')+' markiert \uD83D\uDD01';
  } else {
    btn.className='play-marked-btn';
    document.getElementById('markHint').className='mark-hint';
  }
}

// ── Audio Core ──
function stopAudio(){
  aud.pause();aud.src='';aud.onended=null;aud.onerror=null;
  playing=false;queue=[];
  document.querySelectorAll('.v-play-btn.playing').forEach(b=>{b.classList.remove('playing');b.innerHTML='&#x25B6;';});
  if(curSurah){
    curSurah.v.forEach(v=>{
      const c=document.getElementById('vc_'+curSurah.id+'_'+v.n);
      if(c&&c.classList.contains('playing')){
        c.classList.remove('playing');
        refreshCardClass(curSurah,v.n);
      }
    });
  }
  document.getElementById('stopBtn').classList.remove('show');
  document.getElementById('nowBar').classList.remove('show');
  document.getElementById('playAllBtn').textContent='\u25B6 Abspielen';
}

function startQueue(q){
  stopAudio();if(!q.length)return;
  queue=q;playing=true;
  document.getElementById('stopBtn').classList.add('show');
  document.getElementById('playAllBtn').textContent='\u23F8 L\u00E4uft\u2026';
  playNext();
}

function buildRangeQueue(s){
  const from=Math.max(1,parseInt(document.getElementById('fromInp').value)||1);
  const to=Math.min(s.v.length,parseInt(document.getElementById('toInp').value)||s.v.length);
  const reps=parseInt(document.getElementById('repeatSel').value)||3;
  const verses=s.v.filter(v=>v.n>=from&&v.n<=to);
  const q=[];
  for(let r=0;r<reps;r++)verses.forEach(v=>q.push({sid:s.id,vn:v.n,reps:1,left:1}));
  return q;
}

function playSingleVerse(s,n,reps){
  startQueue([{sid:s.id,vn:n,reps,left:reps}]);
}

function playAll(){if(curSurah)startQueue(buildRangeQueue(curSurah));}

function playMarked(){
  if(!curSurah)return;
  const arr=getMarked(curSurah.id);if(!arr.length)return;
  const reps=parseInt(document.getElementById('repeatSel').value)||3;
  const verses=curSurah.v.filter(v=>arr.includes(v.n));
  // Each verse once per round, whole group repeats N times
  const q=[];
  for(let r=0;r<reps;r++){
    verses.forEach(v=>q.push({sid:curSurah.id,vn:v.n,reps:1,left:1}));
  }
  startQueue(q);
}

function playNext(){
  if(!playing||!queue.length){stopAudio();return;}
  const item=queue[0];
  // Clear previous
  document.querySelectorAll('.v-play-btn.playing').forEach(b=>{b.classList.remove('playing');b.innerHTML='&#x25B6;';});
  if(curSurah)curSurah.v.forEach(v=>{const c=document.getElementById('vc_'+curSurah.id+'_'+v.n);if(c&&c.classList.contains('playing')){c.classList.remove('playing');refreshCardClass(curSurah,v.n);}});
  // Highlight current
  const btn=document.getElementById('vp_'+item.sid+'_'+item.vn);
  const card=document.getElementById('vc_'+item.sid+'_'+item.vn);
  if(btn){btn.classList.add('playing');btn.innerHTML='&#x25A0;';}
  if(card){card.classList.add('playing');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
  const ri=document.getElementById('vri_'+item.sid+'_'+item.vn);
  if(ri)ri.innerHTML='Spielt: <span class="cnt">'+item.left+' / '+item.reps+'&times;</span>';
  // Bottom bar
  const s=SURAHS.find(x=>x.id===item.sid);
  const v=s&&s.v.find(x=>x.n===item.vn);
  if(v){
    document.getElementById('nbAr').textContent=v.t;
    document.getElementById('nbTxt').textContent=(s.name_de.split('\u2014')[0].trim())+' \u00B7 Vers '+item.vn;
    document.getElementById('nowBar').classList.add('show');
  }
  aud.src=audioUrl(item.sid,item.vn);
  aud.onended=()=>{
    item.left--;
    if(item.left>0){
      if(ri)ri.innerHTML='Spielt: <span class="cnt">'+item.left+' / '+item.reps+'&times;</span>';
      aud.src=audioUrl(item.sid,item.vn);aud.play().catch(()=>{});
    } else {
      const reps=parseInt(document.getElementById('repeatSel').value)||3;
      if(ri)ri.innerHTML='Spiele <span class="cnt">'+reps+'&times;</span>';
      queue.shift();setTimeout(playNext,420);
    }
  };
  aud.onerror=()=>{queue.shift();setTimeout(playNext,300);};
  aud.play().catch(()=>{});
}

// ── Completion ──
function checkComplete(s){if(surahDone(s)>=s.v.length)celebrate(s);}
function celebrate(s){
  addStars(s.v.length);
  document.getElementById('celSub').textContent=s.name_ar+' \u2014 '+s.name_de.split('\u2014')[0].trim();
  document.getElementById('celPts').textContent='+'+s.v.length+' Sterne \u2B50';
  const rain=document.getElementById('starRain');rain.innerHTML='';
  const emojis=['\u2B50','\uD83C\uDF1F','\u2728','\uD83C\uDF89'];
  for(let i=0;i<30;i++){
    const el=document.createElement('div');el.className='star-drop';
    el.textContent=emojis[i%emojis.length];
    el.style.left=Math.random()*100+'%';
    el.style.animationDuration=(1.5+Math.random()*2)+'s';
    el.style.animationDelay=(Math.random()*1.2)+'s';
    rain.appendChild(el);
  }
  document.getElementById('celebration').classList.add('show');
}

// ── Sync helpers ──
function syncRangeToMarked(s){
  const arr=getMarked(s.id);
  if(arr.length===0){
    document.getElementById('fromInp').value=1;
    document.getElementById('toInp').value=s.v.length;
  } else {
    document.getElementById('fromInp').value=Math.min(...arr);
    document.getElementById('toInp').value=Math.max(...arr);
  }
}
function syncMarkedToRange(s){
  const from=Math.max(1,parseInt(document.getElementById('fromInp').value)||1);
  const to=Math.min(s.v.length,parseInt(document.getElementById('toInp').value)||s.v.length);
  s.v.forEach(v=>{
    const should=v.n>=from&&v.n<=to;
    const cur=isMarked(s.id,v.n);
    if(should!==cur){
      toggleMarked(s.id,v.n);
      const btn=document.getElementById('vm_'+s.id+'_'+v.n);
      if(btn)btn.className='v-mark-btn'+(should?' marked':'');
      refreshCardClass(s,v.n);
    }
  });
  updateMarkedUi(s);
}

// ── Range sync ──
document.getElementById('fromInp').addEventListener('input',function(){
  const to=document.getElementById('toInp');
  if(parseInt(this.value)>parseInt(to.value))to.value=this.value;
  if(curSurah)syncMarkedToRange(curSurah);
});
document.getElementById('toInp').addEventListener('input',function(){
  const from=document.getElementById('fromInp');
  if(parseInt(this.value)<parseInt(from.value))from.value=this.value;
  if(curSurah)syncMarkedToRange(curSurah);
});
document.getElementById('repeatSel').addEventListener('change',e=>{
  const r=e.target.value;
  document.querySelectorAll('.v-repeat-info').forEach(el=>{
    if(!el.querySelector('.cnt').textContent.includes('/'))
      el.innerHTML='Spiele <span class="cnt">'+r+'&times;</span>';
  });
});

document.getElementById('backBtn').addEventListener('click',closeSurah);
document.getElementById('playAllBtn').addEventListener('click',playAll);
document.getElementById('playMarkedBtn').addEventListener('click',playMarked);
document.getElementById('stopBtn').addEventListener('click',stopAudio);
document.getElementById('nbStop').addEventListener('click',stopAudio);
document.getElementById('celClose').addEventListener('click',()=>{
  document.getElementById('celebration').classList.remove('show');
});

  navigator.serviceWorker.register('./juz-amma-sw.js')

// Install prompt
let deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  document.getElementById('installBtn').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', () => {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  deferredInstall.userChoice.then(() => {
    deferredInstall = null;
    document.getElementById('installBtn').classList.remove('show');
  });
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBtn').classList.remove('show');
});

// Offline indicator
function updateOnline() {
  document.getElementById('offlineBadge').classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOnline);
window.addEventListener('offline', updateOnline);
